{% extends "admin/admin_base.html" %}
{% from "macros.html" import csrf_input %}

{% block head %}Add Hotel{% endblock head %}

{% block style %}
<link rel="stylesheet" href="{{url_for('static',filename='manage_hotel.css')}}" />
{% endblock %}

{% block admin_content %}


<div class='container py-5 my-5'>
    
    <div class='card shadow-sm border-0'>
    <h6 class='py-5 ms-4'><i class="fa-solid fa-user-plus me-2 fs-6"></i>Add Hotel</h6>

    <div class='card-body '>
  
    <form method="POST" class="row g-3" enctype="multipart/form-data">
           <div class="col-md-3">
              <label for="validationCustom04" class="form-label">City</label>
                <select class="form-select" id="validationCustom04" name="city" required>
                <option>All Cities</option>
                <option value="Aberdeen">Aberdeen</option>
                <option value="Belfast">Belfast</option>
                <option value="Birmingham">Birmingham</option>
                <option value="Bristol">Bristol</option>
                <option value="Cardiff">Cardiff</option>
                <option value="Edinburgh">Edinburgh</option>
                <option value="Glasgow">Glasgow</option>
                <option value="London">London</option>
                <option value="Manchester">Manchester</option>
                <option value="New Castle">New Castle</option>
                <option value="Norwich">Norwich</option>
                <option value="Nottingham">Nottingham</option>
                <option value="Oxford">Oxford</option>
                <option value="Plymouth">Plymouth</option>
                <option value="Swansea">Swansea</option>
                <option value="Bournemount">Bournemount</option>
                <option value="Kent">Kent</option>
                </select>
           </div>

        <div class="col-md-6">
            <label class="form-label">Hotel Name</label>
            <input type="text" class="form-control" name="name" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Address</label>
            <input type="text" class="form-control" name="address" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Description</label>
            <input type="text" class="form-control" name="description" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Peak Season Price</label>
            <input type="number" class="form-control" name="peak_rate" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Off-peak Season</label>
            <input type="number" class="form-control" name="offpeak_rate" required>
        </div>

        <div class="col-md-6">
            <label class="form-label fw-semibold">Image</label>
            <input type="file" class="form-control" name="hotel_image" accept="image/*">
        </div>

        

        {{ csrf_input() }}
        <div class="col-12 d-flex justify-content-end gap-2">
              <a href="{{ url_for('manage_hotel.manage_hotels') }}"
                 class="btn btn-outline-secondary">
                Cancel
              </a>
              
              <button class="btn btn-primary">
                <i class="fa fa-save me-1"></i>Add Hotel
              </button>
        </div>
</form>
</div>
</div>
</div>

{% endblock admin_content %}
