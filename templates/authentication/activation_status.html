{% extends "base.html" %}
{% block main %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    {% if success %}
                        <div class="mb-4">
                            <i class="fas fa-check-circle fa-5x text-success"></i>
                        </div>
                        <h2 class="fw-bold text-dark">Success!</h2>
                        <p class="text-muted fs-5">{{ message }}</p>
                        <hr>
                        <p class="small text-secondary">Not redirecting? <a href="{{ url_for('auth.login') }}">Click here</a></p>
                        
                        <script>
                            setTimeout(function() {
                                window.location.href = "{{ url_for('auth.login') }}";
                            }, 5000);
                        </script>
                    {% else %}
                        <div class="mb-4">
                            <i class="fas fa-times-circle fa-5x text-danger"></i>
                        </div>
                        <h2 class="fw-bold text-dark">Activation Failed</h2>
                        <p class="text-muted fs-5">{{ message }}</p>
                        <a href="{{ url_for('auth.register') }}" class="btn btn-primary px-4">Try Registering Again</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
